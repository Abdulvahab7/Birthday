<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      margin: 0;
      padding: 10px;
      overflow: hidden;
    }

    h1 {
      font-size: 22px;
    }

    /* Slideshow */
    #slideshow {
      position: relative;
      width: 80vw;
      max-width: 300px;
      height: 80vw;
      max-height: 300px;
      margin: auto;
      border-radius: 15px;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.5s ease-in-out, transform 3s ease;
      transform: scale(1);
    }

    .slide.active {
      opacity: 1;
      transform: scale(1.08);
    }

    /* Question */
    .question {
      font-size: 20px;
      margin: 20px 10px;
      min-height: 50px;
    }

    /* Buttons */
    button {
      padding: 14px 24px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
    }

    #noBtn {
      background-color: #f44336;
      color: white;
      position: fixed;
    }
  </style>
</head>

<body>

<h1>🎂 A Little Game For You 💖</h1>

<!-- Slideshow -->
<div id="slideshow">
  <img class="slide active" src="img1.png">
  <img class="slide" src="img2.png">
  <img class="slide" src="img3.jpeg">
</div>

<!-- Question -->
<div class="question" id="question"></div>

<!-- Start -->
<button onclick="startGame()">Start 😄</button>

<!-- Buttons -->
<div id="buttons" style="display:none;">
  <button id="yesBtn" onclick="yesClick()">Yes 💖</button>
  <button id="noBtn" ontouchstart="moveNo()" onclick="moveNo()">No 😜</button>
</div>

<!-- Music -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
  let questions = [
    "Hey... ready for this? 😄",
    "Do you like surprises? 🎁",
    "Did I ever make you smile? 😊",
    "Do you miss me sometimes? 🥺",
    "Am I at least a little special? 😌",
    "Okay final one… be honest ❤️",
    "Do you like me? 💖"
  ];

  let index = 0;
  let yesSize = 18;
  let noSize = 18;

  // Typing Effect
  function typeText(text, i = 0) {
    if (i < text.length) {
      document.getElementById("question").innerHTML += text.charAt(i);
      setTimeout(() => typeText(text, i + 1), 35);
    }
  }

  function showQuestion() {
    document.getElementById("question").innerHTML = "";
    typeText(questions[index]);
  }

  function startGame() {
    document.querySelector("button").style.display = "none";
    document.getElementById("buttons").style.display = "block";

    document.getElementById("music").play().catch(()=>{});

    showQuestion();
  }

  // YES click
  function yesClick() {
    index++;

    if (index < questions.length) {
      yesSize = 18;
      noSize = 18;
      updateSize();
      showQuestion();
    } else {
      celebrate();
    }
  }

  // NO button runs + shrinks
  function moveNo() {
    let btn = document.getElementById("noBtn");

    let maxX = window.innerWidth - btn.offsetWidth;
    let maxY = window.innerHeight - btn.offsetHeight;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    btn.style.left = x + "px";
    btn.style.top = y + "px";

    yesSize += 8;
    noSize -= 2;

    if (noSize < 8) noSize = 8;

    updateSize();
  }

  function updateSize() {
    document.getElementById("yesBtn").style.fontSize = yesSize + "px";
    document.getElementById("noBtn").style.fontSize = noSize + "px";
  }

  // Slideshow
  let slides = document.querySelectorAll(".slide");
  let current = 0;

  setInterval(() => {
    slides[current].classList.remove("active");
    current = (current + 1) % slides.length;
    slides[current].classList.add("active");
  }, 2500);

  // Celebration
  function celebrate() {
    document.body.innerHTML = `
      <h1>💖 I KNEW IT 😌💖</h1>
      <p style="font-size:22px;">
        I just wanted to make you smile today 😊<br><br>
        And yeah… I miss you 💫
      </p>
    `;

    let duration = 3 * 1000;
    let end = Date.now() + duration;

    (function frame() {
      confetti({
        particleCount: 6,
        spread: 70,
        origin: { y: 0.6 }
      });

      if (Date.now() < end) {
        requestAnimationFrame(frame);
      }
    })();
  }
</script>

</body>
</html>
