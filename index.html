<!DOCTYPE html>
<html>
<head>
  <title>For You 🐇💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      text-align: center;
      color: white;
      font-family: "Segoe UI Emoji","Apple Color Emoji", Arial, sans-serif;

      background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ff758c, #ff7eb3);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      margin-top: 30px;
      font-size: 26px;
    }

    /* 🐇 Name Animation */
    .name {
      font-size: 34px;
      font-weight: bold;
      background: linear-gradient(45deg, #fff, #ff4081, #00e5ff, #fff);
      background-size: 300% auto;
      -webkit-background-clip: text;
      color: transparent;
      animation: shine 3s linear infinite, pulse 1.5s infinite alternate;
    }

    @keyframes shine {
      to { background-position: 300% center; }
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }

    .question {
      font-size: 20px;
      margin: 30px 15px;
      min-height: 60px;
    }

    button {
      padding: 14px 26px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      margin: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:active {
      transform: scale(0.9);
    }

    #yesBtn {
      background: #4CAF50;
      color: white;
      box-shadow: 0 0 20px #4CAF50;
    }

    #noBtn {
      background: #f44336;
      color: white;
      position: fixed;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: rgba(255,255,255,0.6);
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh);
        opacity: 1;
      }
      to {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<h1>🎂 Happy Birthday <span class="name">Muhshina 🩷🩵</span> 💖</h1>

<div class="question" id="question"></div>

<button onclick="startGame()">Start 😄</button>

<div id="buttons" style="display:none;">
  <button id="yesBtn" onclick="yesClick()">Yes 💖</button>
  <button id="noBtn" ontouchstart="moveNo()" onclick="moveNo()">No 😜</button>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
  let questions = [
    "Hey 🐇… ready for something special? 😄",
    "🐇… We have the cutest memories 😊",
    "Do you keep thinking about me 🐇 💭",
    "Do you miss me too 🐇? 🥺",
    "Is I am special to you 🐇 😌",
    "Okay last one… ❤️",
    "Do you like me? 💖"
  ];

  let index = 0;
  let yesSize = 18;
  let noSize = 18;

  function typeText(text, i = 0) {
    if (i < text.length) {
      document.getElementById("question").innerHTML += text.charAt(i);
      setTimeout(() => typeText(text, i + 1), 30);
    }
  }

  function showQuestion() {
    document.getElementById("question").innerHTML = "";
    typeText(questions[index]);

    let nameEl = document.querySelector(".name");
    let colors = ["#ff4081", "#00e5ff", "#ffd54f", "#69f0ae"];
    nameEl.style.background = `linear-gradient(45deg, ${colors[index % colors.length]}, #fff)`;
    nameEl.style.backgroundSize = "300% auto";
  }

  function startGame() {
    document.querySelector("button").style.display = "none";
    document.getElementById("buttons").style.display = "block";
    document.getElementById("music").play().catch(()=>{});
    showQuestion();
  }

  function yesClick() {
    index++;

    if (index < questions.length) {
      yesSize = 18;
      noSize = 18;
      updateSize();
      showQuestion();
    } else {
      finalBlast();
    }
  }

  function moveNo() {
    let btn = document.getElementById("noBtn");

    let maxX = window.innerWidth - btn.offsetWidth;
    let maxY = window.innerHeight - btn.offsetHeight;

    btn.style.left = Math.random() * maxX + "px";
    btn.style.top = Math.random() * maxY + "px";

    yesSize += 8;
    noSize -= 2;

    if (noSize < 8) noSize = 8;

    updateSize();
  }

  function updateSize() {
    document.getElementById("yesBtn").style.fontSize = yesSize + "px";
    document.getElementById("noBtn").style.fontSize = noSize + "px";
  }

  // Floating hearts generator
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);

  function finalBlast() {
    document.body.innerHTML = `
      <h1 style="font-size:32px;">💖 HAPPY BIRTHDAY 🐇 💖</h1>
      <p style="font-size:22px;">
        Once again Happy Birthday 🩷🫶🏻 Muhshina…<br><br>
        I really miss you AWM 🥺💫
      </p>
      <h2>❤️❤️❤️❤️❤️</h2>
    `;

    let duration = 4 * 1000;
    let end = Date.now() + duration;

    (function frame() {
      confetti({
        particleCount: 12,
        spread: 120,
        origin: { y: 0.6 }
      });

      if (Date.now() < end) {
        requestAnimationFrame(frame);
      }
    })();
  }
</script>

</body>
</html>
