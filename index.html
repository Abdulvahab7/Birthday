<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
      color: #fff;
    }

    h1 {
      margin-top: 30px;
      font-size: 24px;
      animation: fadeIn 2s ease;
    }

    .name {
      font-size: 28px;
      font-weight: bold;
      animation: glow 2s infinite alternate;
    }

    .question {
      font-size: 20px;
      margin: 30px 15px;
      min-height: 60px;
    }

    button {
      padding: 14px 26px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      margin: 10px;
      cursor: pointer;
    }

    #yesBtn {
      background: #4CAF50;
      color: white;
    }

    #noBtn {
      background: #f44336;
      color: white;
      position: fixed;
    }

    /* Animations */
    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 25px #ff4081; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .bounce {
      animation: bounce 0.5s infinite alternate;
    }

    @keyframes bounce {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }
  </style>
</head>

<body>

<h1>🎂 Happy Birthday <span class="name">HerName</span> 💖</h1>

<div class="question" id="question"></div>

<button onclick="startGame()">Start 😄</button>

<div id="buttons" style="display:none;">
  <button id="yesBtn" onclick="yesClick()">Yes 💖</button>
  <button id="noBtn" ontouchstart="moveNo()" onclick="moveNo()">No 😜</button>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
  let questions = [
    "Hey HerName… ready for something special? 😄",
    "You know… HerName, you have a really beautiful smile 😊",
    "Sometimes I wonder… do you miss me too HerName? 🥺",
    "You’ve been on my mind a lot lately HerName 💭",
    "Be honest HerName… am I a little special to you? 😌",
    "Okay final question HerName… ❤️",
    "Do you like me? 💖"
  ];

  let index = 0;
  let yesSize = 18;
  let noSize = 18;

  function typeText(text, i = 0) {
    if (i < text.length) {
      document.getElementById("question").innerHTML += text.charAt(i);
      setTimeout(() => typeText(text, i + 1), 35);
    }
  }

  function showQuestion() {
    document.getElementById("question").innerHTML = "";
    typeText(questions[index]);

    // Change name effect each question
    let nameEl = document.querySelector(".name");
    nameEl.classList.remove("bounce");

    if (index % 2 === 0) {
      nameEl.style.color = "#fff";
    } else {
      nameEl.style.color = "#ff4081";
      nameEl.classList.add("bounce");
    }
  }

  function startGame() {
    document.querySelector("button").style.display = "none";
    document.getElementById("buttons").style.display = "block";

    document.getElementById("music").play().catch(()=>{});

    showQuestion();
  }

  function yesClick() {
    index++;

    if (index < questions.length) {
      yesSize = 18;
      noSize = 18;
      updateSize();
      showQuestion();
    } else {
      finalBlast();
    }
  }

  function moveNo() {
    let btn = document.getElementById("noBtn");

    let maxX = window.innerWidth - btn.offsetWidth;
    let maxY = window.innerHeight - btn.offsetHeight;

    btn.style.left = Math.random() * maxX + "px";
    btn.style.top = Math.random() * maxY + "px";

    yesSize += 8;
    noSize -= 2;

    if (noSize < 8) noSize = 8;

    updateSize();
  }

  function updateSize() {
    document.getElementById("yesBtn").style.fontSize = yesSize + "px";
    document.getElementById("noBtn").style.fontSize = noSize + "px";
  }

  function finalBlast() {
    document.body.innerHTML = `
      <h1 style="font-size:28px;">💖 HAPPY BIRTHDAY HerName 💖</h1>
      <p style="font-size:22px;">
        I didn’t just make this for fun…<br><br>
        I made it because…<br>
        I really miss you 🥺💫
      </p>
      <h2 style="margin-top:20px;">❤️❤️❤️❤️❤️</h2>
    `;

    // Massive love blast
    let duration = 4 * 1000;
    let end = Date.now() + duration;

    (function frame() {
      confetti({
        particleCount: 10,
        spread: 100,
        origin: { y: 0.6 }
      });

      if (Date.now() < end) {
        requestAnimationFrame(frame);
      }
    })();
  }
</script>

</body>
</html>
