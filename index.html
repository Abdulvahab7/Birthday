<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      overflow: hidden;
    }

    h1 {
      margin-top: 20px;
    }

    #slideshow {
      width: 250px;
      height: 250px;
      margin: auto;
      border-radius: 15px;
      overflow: hidden;
    }

    #slideshow img {
      width: 100%;
      height: 100%;
    }

    .question {
      font-size: 22px;
      margin: 20px;
      min-height: 40px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
    }

    #noBtn {
      background-color: #f44336;
      color: white;
      position: absolute;
    }
  </style>
</head>

<body>

<h1>🎂 A Little Game For You 💖</h1>

<div id="slideshow">
  <img id="slide" src="img1.jpg">
</div>

<div class="question" id="question"></div>

<button onclick="startGame()">Start 😄</button>

<div id="buttons" style="display:none;">
  <button id="yesBtn" onclick="yesClick()">Yes 💖</button>
  <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">No 😜</button>
</div>

<!-- Background Music -->
<audio id="music" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
  let questions = [
    "Hey... ready for this? 😄",
    "Do you like surprises? 🎁",
    "Did I ever make you smile? 😊",
    "Do you miss me sometimes? 🥺",
    "Am I at least a little special? 😌",
    "Okay final one… be honest ❤️",
    "Do you like me? 💖"
  ];

  let index = 0;
  let yesSize = 18;
  let noSize = 18;

  let images = ["img1.png", "img2.png", "img3.jpeg"];
  let imgIndex = 0;

  // Slideshow
  setInterval(() => {
    imgIndex = (imgIndex + 1) % images.length;
    document.getElementById("slide").src = images[imgIndex];
  }, 2000);

  function typeText(text, i = 0) {
    if (i < text.length) {
      document.getElementById("question").innerHTML += text.charAt(i);
      setTimeout(() => typeText(text, i + 1), 40);
    }
  }

  function showQuestion() {
    document.getElementById("question").innerHTML = "";
    typeText(questions[index]);
  }

  function startGame() {
    document.querySelector("button").style.display = "none";
    document.getElementById("buttons").style.display = "block";

    document.getElementById("music").play().catch(()=>{});

    showQuestion();
  }

  function yesClick() {
    index++;

    if (index < questions.length) {
      yesSize = 18;
      noSize = 18;
      updateSize();
      showQuestion();
    } else {
      celebrate();
    }
  }

  function moveNo() {
    let btn = document.getElementById("noBtn");

    let x = Math.random() * window.innerWidth * 0.8;
    let y = Math.random() * window.innerHeight * 0.8;

    btn.style.left = x + "px";
    btn.style.top = y + "px";

    yesSize += 10;
    noSize -= 3;

    if (noSize < 5) noSize = 5;

    updateSize();
  }

  function updateSize() {
    document.getElementById("yesBtn").style.fontSize = yesSize + "px";
    document.getElementById("noBtn").style.fontSize = noSize + "px";
  }

  function celebrate() {
    document.body.innerHTML = `
      <h1>💖 I KNEW IT 😌💖</h1>
      <p style="font-size:22px;">
        I just wanted to make you smile today 😊<br><br>
        And yeah… I miss you 💫
      </p>
    `;

    // Confetti
    let duration = 3 * 1000;
    let end = Date.now() + duration;

    (function frame() {
      confetti({
        particleCount: 5,
        spread: 70,
        origin: { y: 0.6 }
      });

      if (Date.now() < end) {
        requestAnimationFrame(frame);
      }
    })();
  }
</script>

</body>
</html>
